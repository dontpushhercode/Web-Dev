<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title">{{ album()!.title}}</h5>
    <h6 class="card-subtitle mb-2 text-body-secondary">{{ album()!.id }}</h6>
    <a [routerLink]="['/albums', album()!.id]" class="btn btn-primary" style>Link</a>
    <a class="btn btn-danger" (click)="delete()">Delete</a>
  </div>
</div>
